<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Step Patch</title>
  <meta name="description" content="Step Patch is an open-source iOS app that adds steps to Apple Health.">
  <link rel="icon" href="app-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,550;9..144,700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #14342e;
      --muted: #547068;
      --paper: #f4faf7;
      --leaf: #1f8a72;
      --leaf-deep: #13624f;
      --card: #ffffff;
      --line: rgba(20, 52, 46, 0.1);
      --max: 1120px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: "Sora", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 480px at 85% -5%, #c9ebe0 0%, transparent 55%),
        radial-gradient(700px 420px at -5% 15%, #e4f7f0 0%, transparent 50%),
        linear-gradient(180deg, #f7fcfa 0%, var(--paper) 35%, #e8f4ef 100%);
      line-height: 1.65;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; height: auto; }
    button { font: inherit; }

    .wrap {
      width: min(100% - 2.5rem, var(--max));
      margin-inline: auto;
    }

    .nav {
      position: absolute;
      inset: 0 0 auto;
      z-index: 5;
      padding: 1.25rem 0;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .nav-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      font-family: "Fraunces", serif;
      font-size: clamp(1.45rem, 3.5vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .nav-brand img {
      width: 48px;
      height: 48px;
      border-radius: 11px;
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      padding: 0.28rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1.5px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .lang-switch button {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .lang-switch button.is-active {
      background: var(--leaf);
      color: #fff;
    }

    .hero {
      position: relative;
      min-height: 100svh;
      padding: 7rem 0 4rem;
      display: grid;
      align-items: center;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(31, 138, 114, 0.08), transparent 42%),
        linear-gradient(180deg, transparent 60%, rgba(228, 247, 240, 0.85));
      pointer-events: none;
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: clamp(2rem, 5vw, 4rem);
      align-items: center;
    }

    .brand {
      font-family: "Fraunces", serif;
      font-size: clamp(3.4rem, 8.5vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.045em;
      line-height: 0.94;
      margin-bottom: 1rem;
      animation: fade-up 0.75s ease both;
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1.5px solid var(--line);
      color: var(--leaf-deep);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      animation: fade-up 0.7s ease both;
      backdrop-filter: blur(8px);
    }

    .lede {
      font-size: clamp(1.05rem, 2.1vw, 1.28rem);
      color: var(--muted);
      max-width: 32ch;
      font-weight: 500;
      margin-bottom: 1.8rem;
      animation: fade-up 0.85s ease 0.06s both;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      animation: fade-up 0.9s ease 0.12s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.96rem;
      padding: 0.9rem 1.3rem;
      border-radius: 0.85rem;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: var(--leaf);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--leaf-deep);
      box-shadow: 0 10px 24px rgba(19, 98, 79, 0.22);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid var(--line);
      color: var(--ink);
      backdrop-filter: blur(8px);
    }

    .phone {
      justify-self: end;
      width: min(100%, 320px);
      animation: rise 1s ease 0.1s both;
    }

    .phone img {
      width: 100%;
      filter: drop-shadow(0 28px 50px rgba(16, 70, 56, 0.22));
    }

    section {
      padding: clamp(4rem, 8vw, 6.5rem) 0;
    }

    .section-head {
      margin-bottom: 2.4rem;
      max-width: 36rem;
    }

    .section-title {
      font-family: "Fraunces", serif;
      font-size: clamp(2rem, 4.5vw, 3rem);
      letter-spacing: -0.035em;
      line-height: 1.1;
      margin-bottom: 0.7rem;
    }

    .section-lead {
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 500;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.15rem;
    }

    .feature-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 1.35rem;
      padding: 1.45rem 1.4rem 1.55rem;
      min-height: 11.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      box-shadow: 0 8px 28px rgba(20, 52, 46, 0.05);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      border-color: rgba(31, 138, 114, 0.28);
      box-shadow: 0 16px 36px rgba(20, 52, 46, 0.08);
    }

    .feature-icon {
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 0.85rem;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #dff7ef, #c8ebd9);
      color: var(--leaf-deep);
      font-family: "Fraunces", serif;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .feature-card h3 {
      font-size: 1.12rem;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .feature-card p {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .start {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.35), transparent),
        radial-gradient(600px 280px at 20% 0%, rgba(184, 224, 210, 0.55), transparent 70%);
    }

    .start-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.15rem;
      counter-reset: step;
    }

    .start-card {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: 1.35rem;
      padding: 1.5rem 1.35rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(20, 52, 46, 0.04);
    }

    .start-card::before {
      counter-increment: step;
      content: "0" counter(step);
      display: block;
      font-family: "Fraunces", serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--leaf);
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .start-card h3 {
      font-size: 1.05rem;
      margin-bottom: 0.45rem;
      letter-spacing: -0.02em;
    }

    .start-card p {
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 500;
    }

    .oss-panel {
      border-radius: 1.8rem;
      padding: clamp(2rem, 5vw, 3.2rem);
      background: linear-gradient(135deg, #1f8a72 0%, #14765f 48%, #0f5a4a 100%);
      color: #f4fffb;
      display: grid;
      grid-template-columns: 1.4fr auto;
      gap: 1.5rem;
      align-items: center;
      box-shadow: 0 20px 48px rgba(15, 90, 74, 0.28);
    }

    .oss-panel .section-title {
      color: #fff;
      margin-bottom: 0.55rem;
    }

    .oss-panel .section-lead {
      color: rgba(244, 255, 251, 0.86);
      margin: 0;
      max-width: 42ch;
    }

    .oss-panel .btn-primary {
      background: #fff;
      color: var(--leaf-deep);
    }

    .oss-panel .btn-primary:hover {
      background: #eefaf5;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    footer {
      padding: 2.4rem 0 3rem;
      color: var(--muted);
      font-size: 0.92rem;
      border-top: 1px solid var(--line);
    }

    footer a {
      color: var(--leaf-deep);
      font-weight: 600;
    }

    footer a:hover { text-decoration: underline; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 900px) {
      .feature-grid,
      .start-grid { grid-template-columns: 1fr 1fr; }
      .oss-panel { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .hero {
        min-height: auto;
        padding: 6rem 0 3rem;
      }

      .hero-grid { grid-template-columns: 1fr; }

      .phone {
        justify-self: center;
        order: -1;
        width: min(100%, 260px);
      }

      .lede { max-width: 34ch; }

      .feature-grid,
      .start-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="Main">
    <div class="wrap nav-inner">
      <a class="nav-brand" href="#top">
        <img src="app-icon.png" alt="">
        Step Patch
      </a>
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" data-lang="zh-Hant" class="is-active">中文</button>
        <button type="button" data-lang="en">EN</button>
      </div>
    </div>
  </nav>

  <header class="hero" id="top">
    <div class="hero-bg" aria-hidden="true"></div>
    <div class="wrap hero-grid">
      <div>
        <h1 class="brand">Step Patch</h1>
        <p class="platform-badge" data-i18n="hero.badge"></p>
        <p class="lede" data-i18n="hero.lede"></p>
        <div class="cta-row">
          <a class="btn btn-primary" href="https://github.com/chouhsiang/step-patch" target="_blank" rel="noopener noreferrer" data-i18n="hero.ctaPrimary"></a>
          <a class="btn btn-ghost" href="#features" data-i18n="hero.ctaSecondary"></a>
        </div>
      </div>
      <div class="phone">
        <img src="screenshot.png" alt="Step Patch app screenshot" width="320" height="640" data-i18n-alt="hero.screenshotAlt">
      </div>
    </div>
  </header>

  <main>
    <section id="features">
      <div class="wrap">
        <div class="section-head">
          <h2 class="section-title" data-i18n="features.title"></h2>
          <p class="section-lead" data-i18n="features.lead"></p>
        </div>

        <div class="feature-grid">
          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">01</div>
            <h3 data-i18n="features.f1.title"></h3>
            <p data-i18n="features.f1.body"></p>
          </article>
          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">02</div>
            <h3 data-i18n="features.f2.title"></h3>
            <p data-i18n="features.f2.body"></p>
          </article>
          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">03</div>
            <h3 data-i18n="features.f3.title"></h3>
            <p data-i18n="features.f3.body"></p>
          </article>
          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">04</div>
            <h3 data-i18n="features.f4.title"></h3>
            <p data-i18n="features.f4.body"></p>
          </article>
          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">05</div>
            <h3 data-i18n="features.f5.title"></h3>
            <p data-i18n="features.f5.body"></p>
          </article>
          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">06</div>
            <h3 data-i18n="features.f6.title"></h3>
            <p data-i18n="features.f6.body"></p>
          </article>
        </div>
      </div>
    </section>

    <section class="start" id="start">
      <div class="wrap">
        <div class="section-head">
          <h2 class="section-title" data-i18n="start.title"></h2>
          <p class="section-lead" data-i18n="start.lead"></p>
        </div>

        <div class="start-grid">
          <article class="start-card">
            <h3 data-i18n="start.s1.title"></h3>
            <p data-i18n-html="start.s1.body"></p>
          </article>
          <article class="start-card">
            <h3 data-i18n="start.s2.title"></h3>
            <p data-i18n="start.s2.body"></p>
          </article>
          <article class="start-card">
            <h3 data-i18n="start.s3.title"></h3>
            <p data-i18n="start.s3.body"></p>
          </article>
        </div>
      </div>
    </section>

    <section class="oss">
      <div class="wrap">
        <div class="oss-panel">
          <div>
            <h2 class="section-title" data-i18n="oss.title"></h2>
            <p class="section-lead" data-i18n="oss.lead"></p>
          </div>
          <a class="btn btn-primary" href="https://github.com/chouhsiang/step-patch" target="_blank" rel="noopener noreferrer">
            github.com/chouhsiang/step-patch
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <p>
        © 2026 Step Patch · by
        <a href="https://blog.chouhsiang.tw/" target="_blank" rel="noopener noreferrer">周詳 Sean Chou</a>
        · MIT License ·
        <a href="https://github.com/chouhsiang/step-patch" target="_blank" rel="noopener noreferrer">GitHub</a>
      </p>
    </div>
  </footer>

  <script>
    const messages = {
      "zh-Hant": {
        "meta.title": "Step Patch — iOS App，把步數寫入「健康」",
        "meta.description": "Step Patch 是開源 iOS App，可手動新增步數並同步到 iPhone「健康」App。",
        "hero.badge": "iOS App",
        "hero.lede": "開源 iOS App，把你輸入的步數寫進 iPhone「健康」App。",
        "hero.ctaPrimary": "查看 GitHub 專案",
        "hero.ctaSecondary": "了解功能",
        "hero.screenshotAlt": "Step Patch App 介面",
        "features.title": "專為補步數而生",
        "features.lead": "這是一款 iOS App：從輸入、同步到查閱紀錄，流程清楚，介面乾淨。",
        "features.f1.title": "快速新增",
        "features.f1.body": "用快捷按鈕或手動輸入步數，一鍵寫入「健康」App。",
        "features.f2.title": "指定時間",
        "features.f2.body": "可選擇紀錄日期與時間，讓步數對應到正確時段。",
        "features.f3.title": "每日統計",
        "features.f3.body": "從健康資料讀取近況，用列表快速掌握每天總步數。",
        "features.f4.title": "明細與刪除",
        "features.f4.body": "點進單日查看每筆紀錄，並可刪除本 App 寫入的資料。",
        "features.f5.title": "中英雙語",
        "features.f5.body": "依系統語言自動切換繁體中文與英文介面。",
        "features.f6.title": "開源授權",
        "features.f6.body": "採 MIT License，歡迎 fork、修改與分享給更多人。",
        "start.title": "開始使用",
        "start.lead": "用 Xcode 開啟專案，裝到實體 iPhone 就能同步到「健康」。",
        "start.s1.title": "開啟專案",
        "start.s1.body": "Clone 後用 Xcode 開啟 <strong>StepEditor.xcodeproj</strong>。",
        "start.s2.title": "設定簽章",
        "start.s2.body": "選擇你的 Team，並確認已啟用 HealthKit。",
        "start.s3.title": "安裝到手機",
        "start.s3.body": "連上 iPhone 後按 Run，允許步數寫入權限即可。",
        "oss.title": "在 GitHub 開源",
        "oss.lead": "原始碼、說明與授權都公開，歡迎一起改進 Step Patch。"
      },
      en: {
        "meta.title": "Step Patch — iOS app for Apple Health steps",
        "meta.description": "Step Patch is an open-source iOS app that lets you manually add steps to the Health app.",
        "hero.badge": "iOS App",
        "hero.lede": "An open-source iOS app that writes the steps you enter into the iPhone Health app.",
        "hero.ctaPrimary": "View on GitHub",
        "hero.ctaSecondary": "See features",
        "hero.screenshotAlt": "Step Patch app screenshot",
        "features.title": "Built for patching steps",
        "features.lead": "This is an iOS app: from adding and syncing to reviewing history, the flow stays simple and clear.",
        "features.f1.title": "Quick add",
        "features.f1.body": "Use presets or type a number, then write steps into the Health app in one tap.",
        "features.f2.title": "Choose a time",
        "features.f2.body": "Pick the date and time so each entry lands in the right moment.",
        "features.f3.title": "Daily totals",
        "features.f3.body": "Read recent Health data and browse daily step totals at a glance.",
        "features.f4.title": "Details & delete",
        "features.f4.body": "Open a day to inspect each sample and delete records written by this app.",
        "features.f5.title": "Chinese & English",
        "features.f5.body": "The app UI follows the system language for Traditional Chinese and English.",
        "features.f6.title": "Open source",
        "features.f6.body": "MIT licensed. Fork it, improve it, and share it freely.",
        "start.title": "Get started",
        "start.lead": "Open the project in Xcode, install it on a physical iPhone, and sync to Health.",
        "start.s1.title": "Open the project",
        "start.s1.body": "Clone the repo and open <strong>StepEditor.xcodeproj</strong> in Xcode.",
        "start.s2.title": "Set up signing",
        "start.s2.body": "Choose your Team and confirm HealthKit is enabled.",
        "start.s3.title": "Install on iPhone",
        "start.s3.body": "Connect your iPhone, press Run, and allow write access for steps.",
        "oss.title": "Open source on GitHub",
        "oss.lead": "Source code, docs, and license are public. Help improve Step Patch."
      }
    };

    const storageKey = "step-patch-lang";

    function resolveLang() {
      const saved = localStorage.getItem(storageKey);
      if (saved === "en" || saved === "zh-Hant") return saved;
      const browser = (navigator.language || "zh-Hant").toLowerCase();
      return browser.startsWith("zh") ? "zh-Hant" : "en";
    }

    function applyLang(lang) {
      const dict = messages[lang] || messages["zh-Hant"];
      document.documentElement.lang = lang;

      document.title = dict["meta.title"];
      const description = document.querySelector('meta[name="description"]');
      if (description) description.setAttribute("content", dict["meta.description"]);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[key] != null) el.textContent = dict[key];
      });

      document.querySelectorAll("[data-i18n-html]").forEach((el) => {
        const key = el.getAttribute("data-i18n-html");
        if (dict[key] != null) el.innerHTML = dict[key];
      });

      document.querySelectorAll("[data-i18n-alt]").forEach((el) => {
        const key = el.getAttribute("data-i18n-alt");
        if (dict[key] != null) el.setAttribute("alt", dict[key]);
      });

      document.querySelectorAll(".lang-switch button").forEach((btn) => {
        btn.classList.toggle("is-active", btn.getAttribute("data-lang") === lang);
      });

      localStorage.setItem(storageKey, lang);
    }

    document.querySelectorAll(".lang-switch button").forEach((btn) => {
      btn.addEventListener("click", () => applyLang(btn.getAttribute("data-lang")));
    });

    applyLang(resolveLang());
  </script>
</body>
</html>
